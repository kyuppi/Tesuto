<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やきとり ひまわり 予約サイト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .sold-out { filter: grayscale(1) opacity(0.6); pointer-events: none; }
        .loading-spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: #ea580c; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <!-- Loading Overlay -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="loading-spinner mb-4"></div>
        <p class="font-bold text-orange-600">読み込み中...</p>
    </div>

    <!-- Notifications -->
    <div id="notification-container" class="fixed top-4 right-4 z-[60] flex flex-col gap-2 w-72 pointer-events-none"></div>

    <!-- Header -->
    <header class="bg-orange-600 text-white p-4 sticky top-0 z-40 shadow-lg">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="store" class="text-yellow-300"></i>
                <h1 class="text-xl font-black tracking-tighter">やきとり ひまわり</h1>
            </div>
            <button id="admin-toggle-btn" class="text-xs font-bold bg-orange-900/40 px-4 py-2 rounded-full border border-white/20">
                店長ログイン
            </button>
        </div>
    </header>

    <main id="app-content" class="max-w-2xl mx-auto p-4">
        
        <!-- CUSTOMER VIEW -->
        <div id="customer-view" class="space-y-6">
            <!-- Schedule Card -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-stone-200">
                <h2 class="font-bold text-orange-800 flex items-center gap-2 mb-3 text-sm">
                    <i data-lucide="calendar" class="w-4 h-4"></i> 今日の出店スケジュール
                </h2>
                <div class="grid grid-cols-2 gap-2 text-[11px] font-bold">
                    <div class="bg-orange-50 p-2 rounded-xl text-orange-700 border border-orange-100">木・日: 藪塚店</div>
                    <div class="bg-orange-50 p-2 rounded-xl text-orange-700 border border-orange-100">金: アバンセ玉村</div>
                    <div class="bg-orange-50 p-2 rounded-xl text-orange-700 border border-orange-100">土: アバンセ粕川</div>
                    <div class="bg-stone-50 p-2 rounded-xl text-stone-400">月火水: 定休日</div>
                </div>
            </div>

            <!-- Form section -->
            <form id="order-form" class="space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-200 space-y-4">
                    <h3 class="font-black text-lg text-stone-800 border-b pb-2 flex items-center gap-2">
                        <span class="bg-orange-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                        お客様情報
                    </h3>
                    <div>
                        <label class="text-[10px] font-black text-stone-400 uppercase ml-1">受取り希望日</label>
                        <input type="date" id="order-date" required class="w-full p-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 font-bold outline-none">
                        <div id="location-badge" class="mt-2 hidden p-3 bg-orange-50 rounded-xl text-orange-700 text-sm font-bold flex items-center gap-2 italic">
                            <i data-lucide="map-pin" class="w-4 h-4"></i> <span id="location-text"></span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="order-name" required placeholder="お名前" class="p-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 font-bold outline-none">
                        <input type="tel" id="order-phone" required placeholder="電話番号" class="p-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 font-bold outline-none">
                    </div>
                    <textarea id="order-notes" placeholder="その他のご要望（例: 18時頃伺います、塩少なめ等）" class="w-full p-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500 font-bold outline-none h-24 resize-none"></textarea>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-200 space-y-4">
                    <h3 class="font-black text-lg text-stone-800 border-b pb-2 flex items-center gap-2">
                        <span class="bg-orange-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                        メニュー選択
                    </h3>
                    <div id="menu-container" class="space-y-4">
                        <!-- JSで生成 -->
                    </div>
                </div>

                <!-- Footer Cart Bar -->
                <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-xl border-t border-stone-200 z-30">
                    <div class="max-w-2xl mx-auto flex items-center gap-4">
                        <div class="shrink-0 leading-tight">
                            <p class="text-[10px] font-black text-stone-400 uppercase">Total</p>
                            <p class="text-2xl font-black text-orange-600">¥<span id="total-price">0</span></p>
                        </div>
                        <button type="submit" id="submit-btn" disabled class="flex-1 bg-orange-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-200 disabled:bg-stone-300 disabled:shadow-none transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i data-lucide="check-circle" class="w-5 h-5"></i>
                            予約を確定する
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ADMIN VIEW -->
        <div id="admin-view" class="hidden space-y-6 pb-12">
            <div class="bg-stone-900 text-white p-6 rounded-3xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black flex items-center gap-2"><i data-lucide="settings"></i> 管理パネル</h2>
                    <button id="csv-btn" class="bg-green-600 text-white p-3 rounded-2xl hover:bg-green-700 shadow-lg"><i data-lucide="download"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/10 p-4 rounded-2xl">
                        <span class="text-[10px] font-bold text-stone-400 block mb-1">本日の予約</span>
                        <span id="today-count" class="text-2xl font-black">0 件</span>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl">
                        <span class="text-[10px] font-bold text-stone-400 block mb-1">全予約数</span>
                        <span id="all-count" class="text-2xl font-black">0 件</span>
                    </div>
                </div>
            </div>

            <section class="bg-white p-6 rounded-3xl shadow-sm border">
                <h3 class="font-black text-stone-400 text-[10px] uppercase tracking-widest mb-4">在庫管理（売切設定）</h3>
                <div id="inventory-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    <!-- JSで生成 -->
                </div>
            </section>

            <section id="reservations-list" class="space-y-4">
                <h3 class="font-black text-stone-400 text-[10px] uppercase tracking-widest ml-1">予約履歴</h3>
                <!-- JSで生成 -->
            </section>
        </div>
    </main>

    <!-- Admin Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-stone-900/80 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 flex items-center gap-2 text-orange-900">
                <i data-lucide="lock" class="text-orange-600"></i> 店長ログイン
            </h2>
            <input type="password" id="pass-input" placeholder="パスワードを入力" class="w-full p-4 border-2 border-stone-200 rounded-2xl mb-4 focus:border-orange-500 outline-none text-xl tracking-widest text-center">
            <button id="login-confirm-btn" class="w-full bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-700 transition">ログイン</button>
            <button id="login-cancel-btn" class="w-full mt-4 text-stone-400 font-bold">キャンセル</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Config & Data ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'himawari-yakitori-v1';

        const MENU_ITEMS = [
            { id: 'm1', name: 'ねぎま', price: 140 },
            { id: 'm2', name: '焼き鳥', price: 140 },
            { id: 'm3', name: '手羽中', price: 140 },
            { id: 'm4', name: '鳥軟骨', price: 140 },
            { id: 'm5', name: '豚レバー', price: 140 },
            { id: 'm6', name: 'カシラ', price: 140 },
            { id: 'm7', name: '豚タン', price: 140 },
            { id: 'm8', name: '豚白モツ', price: 120 },
            { id: 'm9', name: '鶏皮', price: 120 },
            { id: 'm10', name: 'つくね', price: 120 },
            { id: 'm11', name: 'むね肉ニンニク', price: 120 },
        ];
        const FLAVORS = ['タレ', '塩コショウ', 'こしょうなし'];
        const SCHEDULE = { 0: 'ジョイフーズ 藪塚店', 4: 'ジョイフーズ 藪塚店', 5: 'アバンセ 玉村', 6: 'アバンセ 粕川' };

        // --- State ---
        let cart = {};
        let soldOutItems = {};
        let reservations = [];
        let currentMode = 'customer';

        // --- Auth & Sync ---
        window.onload = async () => {
            lucide.createIcons();
            await signInAnonymously(auth);
            
            // Sync Inventory
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'inventory'), (snap) => {
                soldOutItems = snap.exists() ? snap.data().soldOut : {};
                renderMenu();
                renderInventoryAdmin();
            });

            // Sync Reservations
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), (snap) => {
                const newRes = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a,b) => new Date(b.createdAt?.seconds*1000 || 0) - new Date(a.createdAt?.seconds*1000 || 0));
                
                if (reservations.length > 0 && newRes.length > reservations.length && currentMode === 'admin') {
                    showNotification("新規予約が届きました！");
                }
                reservations = newRes;
                renderReservations();
                updateAdminStats();
                document.getElementById('loading-screen').classList.add('hidden');
            });
        };

        // --- Rendering ---
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = MENU_ITEMS.map(item => {
                const isSoldOut = soldOutItems[item.id];
                return `
                    <div class="p-4 rounded-2xl border-2 transition-all ${isSoldOut ? 'bg-stone-50 border-stone-100 opacity-40' : 'bg-white border-stone-100 shadow-sm'}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-black text-lg">${item.name}</span>
                            <span class="text-orange-600 font-black">${item.price}円</span>
                        </div>
                        ${isSoldOut ? '<div class="text-center font-bold text-stone-400 py-2 italic">SOLD OUT</div>' : `
                            <div class="space-y-2">
                                ${FLAVORS.map(flavor => {
                                    const key = `${item.id}-${flavor}`;
                                    const count = cart[key] || 0;
                                    return `
                                        <div class="flex items-center justify-between bg-stone-50/50 p-2 rounded-xl">
                                            <span class="text-[10px] font-black text-stone-500 ml-2">${flavor}</span>
                                            <div class="flex items-center gap-4">
                                                <button type="button" onclick="window.updateCartCount('${item.id}', '${flavor}', -1)" class="w-10 h-10 rounded-full bg-white border border-stone-200 flex items-center justify-center font-bold text-stone-400 shadow-sm">-</button>
                                                <span class="w-4 text-center font-black">${count}</span>
                                                <button type="button" onclick="window.updateCartCount('${item.id}', '${flavor}', 1)" class="w-10 h-10 rounded-full bg-orange-600 text-white flex items-center justify-center font-bold shadow-lg">+</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `}
                    </div>
                `;
            }).join('');
        }

        function renderInventoryAdmin() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = MENU_ITEMS.map(item => `
                <button onclick="window.toggleSoldOut('${item.id}')" class="p-3 rounded-xl border-2 font-black text-[10px] transition-all flex flex-col items-center gap-1 ${soldOutItems[item.id] ? 'bg-red-50 border-red-200 text-red-600' : 'bg-stone-50 border-stone-100 text-stone-600'}">
                    <span>${item.name}</span>
                    <span class="text-[8px] px-2 py-0.5 rounded-full ${soldOutItems[item.id] ? 'bg-red-200' : 'bg-stone-200'}">${soldOutItems[item.id] ? '売切' : '販売中'}</span>
                </button>
            `).join('');
        }

        function renderReservations() {
            const list = document.getElementById('reservations-list');
            if (reservations.length === 0) {
                list.innerHTML = `<div class="p-12 text-center text-stone-400 font-bold border-2 border-dashed rounded-3xl">予約はまだありません</div>`;
                return;
            }
            list.innerHTML = reservations.map(res => `
                <div class="bg-white p-5 rounded-3xl border border-stone-200 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-orange-600"></div>
                    <div class="flex justify-between items-start mb-2 pl-2">
                        <div>
                            <span class="text-[9px] font-black bg-stone-100 p-1 rounded uppercase">${new Date(res.createdAt?.seconds*1000).toLocaleString()}</span>
                            <h4 class="text-xl font-black">${res.name} 様</h4>
                            <p class="text-xs text-blue-600 font-bold">${res.phone}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] font-black bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full">${res.location}</span>
                            <div class="text-xl font-black text-orange-600">¥${res.total.toLocaleString()}</div>
                        </div>
                    </div>
                    ${res.notes ? `<div class="bg-stone-50 p-2 rounded-xl text-[10px] text-stone-500 font-bold border mb-3 ml-2 italic">要望: ${res.notes}</div>` : ''}
                    <div class="grid grid-cols-1 gap-1 ml-2 text-[11px] font-bold text-stone-600">
                        ${Object.entries(res.items).map(([key, count]) => {
                            const [id, flavor] = key.split('-');
                            const name = MENU_ITEMS.find(m => m.id === id).name;
                            return `<div class="flex justify-between border-b border-stone-50 pb-1"><span>${name} (${flavor})</span><span>${count}本</span></div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        // --- Actions ---
        window.updateCartCount = (id, flavor, delta) => {
            const key = `${id}-${flavor}`;
            const current = cart[key] || 0;
            const next = Math.max(0, current + delta);
            if (next === 0) delete cart[key];
            else cart[key] = next;
            
            updateCartSummary();
            renderMenu();
        };

        function updateCartSummary() {
            let total = 0;
            let count = 0;
            Object.entries(cart).forEach(([key, amount]) => {
                const id = key.split('-')[0];
                const price = MENU_ITEMS.find(m => m.id === id).price;
                total += price * amount;
                count += amount;
            });
            document.getElementById('total-price').innerText = total.toLocaleString();
            document.getElementById('submit-btn').disabled = count === 0 || !document.getElementById('order-date').value;
        }

        window.toggleSoldOut = async (id) => {
            const newSoldOut = { ...soldOutItems, [id]: !soldOutItems[id] };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory'), { soldOut: newSoldOut });
        };

        // --- Events ---
        document.getElementById('order-date').addEventListener('change', (e) => {
            const date = new Date(e.target.value);
            const day = date.getDay();
            const loc = SCHEDULE[day];
            const badge = document.getElementById('location-badge');
            if (loc) {
                document.getElementById('location-text').innerText = `受取場所: ${loc}`;
                badge.classList.remove('hidden');
                badge.classList.add('bg-orange-50', 'text-orange-700');
                badge.classList.remove('bg-red-50', 'text-red-700');
            } else {
                document.getElementById('location-text').innerText = '定休日です';
                badge.classList.remove('hidden');
                badge.classList.add('bg-red-50', 'text-red-700');
                badge.classList.remove('bg-orange-50', 'text-orange-700');
            }
            updateCartSummary();
        });

        document.getElementById('order-form').onsubmit = async (e) => {
            e.preventDefault();
            const dateVal = document.getElementById('order-date').value;
            const loc = SCHEDULE[new Date(dateVal).getDay()];
            if (!loc) return alert('定休日は予約できません');

            const order = {
                createdAt: serverTimestamp(),
                date: dateVal,
                location: loc,
                name: document.getElementById('order-name').value,
                phone: document.getElementB};

const ADMIN_PASSWORD = '7777';

export default function App() {
  const [user, setUser] = useState(null);
  const [viewMode, setViewMode] = useState('customer');
  const [showLoginModal, setShowLoginModal] = useState(false);
  const [passwordInput, setPasswordInput] = useState('');
  const [loginError, setLoginError] = useState(false);

  // フォーム状態
  const [cart, setCart] = useState({});
  const [selectedDate, setSelectedDate] = useState('');
  const [customerName, setCustomerName] = useState('');
  const [customerPhone, setCustomerPhone] = useState('');
  const [customerNotes, setCustomerNotes] = useState('');
  
  // クラウドデータ
  const [reservations, setReservations] = useState([]);
  const [soldOutItems, setSoldOutItems] = useState({});
  const [notifications, setNotifications] = useState([]);
  const [isLoading, setIsLoading] = useState(true);

  // 1. Firebase 認証
  useEffect(() => {
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (e) {
        console.error("Auth Error", e);
      }
    };
    initAuth();
    return onAuthStateChanged(auth, setUser);
  }, []);

  // 2. リアルタイムデータ同期
  useEffect(() => {
    if (!user) return;

    // 予約リストの取得 (最新順)
    const resRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
    const unsubscribeRes = onSnapshot(resRef, (snapshot) => {
      const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      const sorted = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      
      // 新着通知 (ブラウザを開いている店長用)
      if (reservations.length > 0 && sorted.length > reservations.length) {
        const newest = sorted[0];
        setNotifications(prev => [{
          id: Date.now(),
          message: `注文着信: ${newest.name}様より ${Object.values(newest.items).reduce((acc, i) => acc + i.amount, 0)}本`
        }, ...prev]);
      }
      
      setReservations(sorted);
      setIsLoading(false);
    }, (err) => console.error("Firestore Error", err));

    // 売り切れ設定の取得
    const invRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory');
    const unsubscribeInv = onSnapshot(invRef, (docSnap) => {
      if (docSnap.exists()) {
        setSoldOutItems(docSnap.data().soldOut || {});
      }
    });

    return () => {
      unsubscribeRes();
      unsubscribeInv();
    };
  }, [user]);

  // アクション: カート操作
  const updateCart = (id, flavor, delta) => {
    const key = `${id}-${flavor}`;
    setCart(prev => {
      const current = prev[key]?.amount || 0;
      const next = Math.max(0, current + delta);
      if (next === 0) {
        const newCart = { ...prev };
        delete newCart[key];
        return newCart;
      }
      return { ...prev, [key]: { id, flavor, amount: next } };
    });
  };

  const cartTotal = Object.values(cart).reduce((acc, item) => {
    const menu = MENU_ITEMS.find(m => m.id === item.id);
    return {
      price: acc.price + (menu.price * item.amount),
      count: acc.count + item.amount
    };
  }, { price: 0, count: 0 });

  // アクション: 予約送信
  const submitOrder = async (e) => {
    e.preventDefault();
    if (!user) return;
    if (cartTotal.count === 0) return alert('商品を選んでください');

    const day = new Date(selectedDate).getDay();
    const location = SCHEDULE[day] || '定休日';

    const order = {
      createdAt: new Date().toISOString(),
      date: selectedDate,
      location: location,
      name: customerName,
      phone: customerPhone,
      notes: customerNotes,
      items: cart,
      total: cartTotal.price
    };

    try {
      await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), order);
      alert(`予約を承りました！\n受取場所: ${location}`);
      setCart({});
      setCustomerName('');
      setCustomerPhone('');
      setCustomerNotes('');
      setSelectedDate('');
    } catch (e) {
      alert('送信に失敗しました。電波の良いところで再度お試しください。');
    }
  };

  // アクション: 売り切れ切替
  const handleToggleSoldOut = async (id) => {
    const newStatus = { ...soldOutItems, [id]: !soldOutItems[id] };
    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory'), { soldOut: newStatus });
  };

  // CSV出力
  const downloadCSV = () => {
    const headers = ['日時', '受取場所', 'お名前', '電話番号', '注文内容', '合計金額', '備考'];
    const rows = reservations.map(r => [
      new Date(r.createdAt).toLocaleString('ja-JP'),
      r.location,
      r.name,
      r.phone,
      Object.values(r.items).map(i => `${MENU_ITEMS.find(m=>m.id===i.id).name}(${i.flavor})x${i.amount}`).join(' '),
      r.total,
      r.notes
    ].map(v => `"${v || ''}"`).join(','));
    
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `himawari_order_${new Date().toLocaleDateString('ja-JP')}.csv`;
    link.click();
  };

  if (isLoading && viewMode === 'customer') {
    return <div className="h-screen flex items-center justify-center bg-orange-50"><Loader2 className="animate-spin text-orange-600" size={40} /></div>;
  }

  return (
    <div className="min-h-screen bg-stone-100 font-sans pb-24 text-stone-900">
      {/* リアルタイム通知ポップアップ */}
      <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 w-72">
        {notifications.map(n => (
          <div key={n.id} className="bg-orange-600 text-white p-4 rounded-xl shadow-2xl flex items-start gap-3 animate-bounce border-2 border-white">
            <Bell size={20} className="shrink-0 mt-1" />
            <div className="text-sm font-bold">{n.message}</div>
            <button onClick={() => setNotifications(prev => prev.filter(x => x.id !== n.id))}><X size={16}/></button>
          </div>
        ))}
      </div>

      {/* ログイン画面 */}
      {showLoginModal && (
        <div className="fixed inset-0 bg-stone-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
          <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h2 className="text-2xl font-black mb-6 flex items-center gap-2"><Lock className="text-orange-600"/> 店長ログイン</h2>
            <form onSubmit={(e) => {
              e.preventDefault();
              if (passwordInput === ADMIN_PASSWORD) {
                setViewMode('admin');
                setShowLoginModal(false);
                setPasswordInput('');
              } else {
                setLoginError(true);
              }
            }}>
              <input 
                type="password" 
                placeholder="パスワードを入力" 
                className="w-full p-4 border-2 border-stone-200 rounded-2xl mb-2 focus:border-orange-500 outline-none text-xl tracking-widest"
                value={passwordInput}
                onChange={(e) => setPasswordInput(e.target.value)}
                autoFocus
              />
              {loginError && <p className="text-red-500 text-xs font-bold mb-4 ml-2">パスワードが違います</p>}
              <button className="w-full bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-700 active:scale-95 transition">ログイン</button>
              <button type="button" onClick={() => setShowLoginModal(false)} className="w-full mt-4 text-stone-400 font-bold">キャンセル</button>
            </form>
          </div>
        </div>
      )}

      {/* ヘッダー */}
      <header className="bg-white border-b border-stone-200 p-4 sticky top-0 z-40">
        <div className="max-w-2xl mx-auto flex justify-between items-center">
          <div className="flex items-center gap-2">
            <div className="bg-orange-600 p-2 rounded-lg text-white"><Store size={24} /></div>
            <h1 className="text-xl font-black tracking-tighter">やきとり ひまわり</h1>
          </div>
          {viewMode === 'customer' ? (
            <button onClick={() => setShowLoginModal(true)} className="bg-stone-100 text-stone-500 p-2 rounded-full hover:bg-stone-200"><Settings size={20}/></button>
          ) : (
            <button onClick={() => setViewMode('customer')} className="bg-orange-600 text-white px-4 py-2 rounded-full font-bold text-sm">注文画面に戻る</button>
          )}
        </div>
      </header>

      <main className="max-w-2xl mx-auto p-4">
        {viewMode === 'customer' ? (
          <div className="space-y-6">
            {/* 営業案内 */}
            <div className="bg-white p-5 rounded-3xl border border-stone-200 shadow-sm">
              <h2 className="font-bold text-stone-500 text-xs uppercase tracking-widest mb-3">営業スケジュール</h2>
              <div className="grid grid-cols-2 gap-2 text-sm">
                <div className="bg-stone-50 p-3 rounded-2xl border border-stone-100">
                  <span className="block font-black text-orange-600">木・日曜日</span>
                  <span className="text-xs">ジョイフーズ 藪塚店</span>
                </div>
                <div className="bg-stone-50 p-3 rounded-2xl border border-stone-100">
                  <span className="block font-black text-orange-600">金曜日</span>
                  <span className="text-xs">アバンセ 玉村</span>
                </div>
                <div className="bg-stone-50 p-3 rounded-2xl border border-stone-100">
                  <span className="block font-black text-orange-600">土曜日</span>
                  <span className="text-xs">アバンセ 粕川</span>
                </div>
                <div className="bg-stone-50 p-3 rounded-2xl border border-stone-100 flex items-center justify-center text-stone-400 font-bold italic">
                  月火水 定休日
                </div>
              </div>
            </div>

            <form onSubmit={submitOrder} className="space-y-6 pb-20">
              {/* 基本情報入力 */}
              <section className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm space-y-4">
                <h3 className="font-black text-lg flex items-center gap-2 text-orange-900 leading-none">
                  <span className="bg-orange-100 text-orange-600 w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
                  受取情報
                </h3>
                
                <div className="space-y-3">
                  <div>
                    <label className="text-[10px] font-black text-stone-400 uppercase ml-1">受取希望日</label>
                    <input 
                      type="date" 
                      required 
                      className="w-full p-4 bg-stone-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold"
                      value={selectedDate}
                      onChange={(e) => setSelectedDate(e.target.value)}
                    />
                    {selectedDate && (
                      <div className="mt-2 p-3 bg-orange-50 rounded-xl text-orange-700 text-sm font-bold flex items-center gap-2">
                        <MapPin size={16}/> {SCHEDULE[new Date(selectedDate).getDay()] || '定休日です'}
                      </div>
                    )}
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <input 
                      type="text" 
                      required 
                      placeholder="お名前" 
                      className="p-4 bg-stone-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold"
                      value={customerName}
                      onChange={(e) => setCustomerName(e.target.value)}
                    />
                    <input 
                      type="tel" 
                      required 
                      placeholder="電話番号" 
                      className="p-4 bg-stone-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold"
                      value={customerPhone}
                      onChange={(e) => setCustomerPhone(e.target.value)}
                    />
                  </div>
                  <textarea 
                    placeholder="その他の要望（例: 塩少なめ、18時頃伺いますなど）" 
                    className="w-full p-4 bg-stone-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold h-24 resize-none"
                    value={customerNotes}
                    onChange={(e) => setCustomerNotes(e.target.value)}
                  ></textarea>
                </div>
              </section>

              {/* メニュー選択 */}
              <section className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm space-y-4">
                <h3 className="font-black text-lg flex items-center gap-2 text-orange-900 leading-none">
                  <span className="bg-orange-100 text-orange-600 w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>
                  メニュー
                </h3>
                
                <div className="space-y-4">
                  {MENU_ITEMS.map(item => {
                    const isSoldOut = soldOutItems[item.id];
                    return (
                      <div key={item.id} className={`p-4 rounded-2xl border-2 transition-all ${isSoldOut ? 'bg-stone-50 border-stone-100 opacity-40' : 'bg-white border-stone-100 shadow-sm'}`}>
                        <div className="flex justify-between items-center mb-4">
                          <span className="font-black text-lg">{item.name}</span>
                          <span className="text-orange-600 font-black">{item.price}円</span>
                        </div>
                        
                        {isSoldOut ? (
                          <div className="text-center font-bold text-stone-400 py-2 italic">SOLD OUT</div>
                        ) : (
                          <div className="space-y-2">
                            {FLAVORS.map(flavor => {
                              const count = cart[`${item.id}-${flavor}`]?.amount || 0;
                              return (
                                <div key={flavor} className="flex items-center justify-between bg-stone-50/50 p-2 rounded-xl">
                                  <span className="text-xs font-black text-stone-500 ml-2">{flavor}</span>
                                  <div className="flex items-center gap-4">
                                    <button 
                                      type="button" 
                                      onClick={() => updateCart(item.id, flavor, -1)}
                                      className="w-10 h-10 rounded-full bg-white border border-stone-200 shadow-sm flex items-center justify-center font-bold text-stone-400 active:bg-stone-100"
                                    >-</button>
                                    <span className="w-4 text-center font-black text-lg">{count}</span>
                                    <button 
                                      type="button" 
                                      onClick={() => updateCart(item.id, flavor, 1)}
                                      className="w-10 h-10 rounded-full bg-orange-600 shadow-lg flex items-center justify-center font-bold text-white active:scale-95 transition"
                                    >+</button>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </section>

              {/* 固定カート */}
              <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-xl border-t border-stone-200 z-30">
                <div className="max-w-2xl mx-auto flex items-center gap-4">
                  <div className="shrink-0">
                    <p className="text-[10px] font-black text-stone-400 uppercase leading-none mb-1">Total</p>
                    <p className="text-2xl font-black text-orange-600 leading-none">¥{cartTotal.price.toLocaleString()}</p>
                  </div>
                  <button 
                    disabled={cartTotal.count === 0 || !selectedDate || SCHEDULE[new Date(selectedDate).getDay()] === undefined}
                    className="flex-1 bg-orange-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-200 disabled:bg-stone-300 disabled:shadow-none transition-all active:scale-95 flex items-center justify-center gap-2"
                  >
                    <CheckCircle size={20}/>
                    予約を確定する
                  </button>
                </div>
              </div>
            </form>
          </div>
        ) : (
          <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-12">
            {/* 管理ツールバー */}
            <div className="bg-stone-900 text-white p-6 rounded-3xl shadow-xl">
              <div className="flex justify-between items-center mb-6">
                <div>
                  <h2 className="text-2xl font-black flex items-center gap-2">管理パネル</h2>
                  <p className="text-stone-400 text-xs font-bold uppercase mt-1">Yakitori Himawari Dashboard</p>
                </div>
                <button 
                  onClick={downloadCSV}
                  className="bg-green-600 text-white p-3 rounded-2xl shadow-lg hover:bg-green-700 transition"
                >
                  <Download />
                </button>
              </div>
              
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-white/10 p-4 rounded-2xl">
                  <span className="text-xs font-bold text-stone-400 block mb-1">本日の予約</span>
                  <span className="text-2xl font-black">{reservations.filter(r => r.date === new Date().toISOString().split('T')[0]).length} 件</span>
                </div>
                <div className="bg-white/10 p-4 rounded-2xl">
                  <span className="text-xs font-bold text-stone-400 block mb-1">未対応通知</span>
                  <span className="text-2xl font-black">{notifications.length} 件</span>
                </div>
              </div>
            </div>

            {/* 売り切れスイッチ */}
            <section className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm">
              <h3 className="font-black text-stone-400 text-[10px] uppercase tracking-widest mb-4">在庫管理（売切設定）</h3>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {MENU_ITEMS.map(item => (
                  <button 
                    key={item.id} 
                    onClick={() => handleToggleSoldOut(item.id)}
                    className={`p-4 rounded-2xl font-black text-xs transition-all border-2 flex flex-col items-center gap-1 ${
                      soldOutItems[item.id] 
                        ? 'bg-red-50 border-red-200 text-red-600' 
                        : 'bg-stone-50 border-stone-100 text-stone-600'
                    }`}
                  >
                    <span>{item.name}</span>
                    <span className={`text-[10px] px-2 py-0.5 rounded-full ${soldOutItems[item.id] ? 'bg-red-200' : 'bg-stone-200'}`}>
                      {soldOutItems[item.id] ? '売切中' : '販売中'}
                    </span>
                  </button>
                ))}
              </div>
            </section>

            {/* 予約一覧 */}
            <section className="space-y-4">
              <h3 className="font-black text-stone-400 text-[10px] uppercase tracking-widest ml-1">予約履歴</h3>
              {reservations.length === 0 ? (
                <div className="bg-white border-2 border-dashed border-stone-200 p-12 rounded-3xl text-center text-stone-400 font-bold">予約はまだありません</div>
              ) : (
                reservations.map(res => (
                  <div key={res.id} className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-orange-600"></div>
                    <div className="flex justify-between items-start mb-4 pl-2">
                      <div>
                        <span className="text-[10px] font-black bg-stone-100 text-stone-500 px-2 py-1 rounded-lg uppercase">{new Date(res.createdAt).toLocaleString('ja-JP')}</span>
                        <h4 className="text-2xl font-black mt-1">{res.name} 様</h4>
                        <a href={`tel:${res.phone}`} className="text-blue-600 font-bold text-sm flex items-center gap-1"><Phone size={14}/> {res.phone}</a>
                      </div>
                      <div className="text-right">
                        <span className="text-[10px] font-black bg-orange-100 text-orange-700 px-3 py-1 rounded-full">{res.location}</span>
                        <div className="text-2xl font-black text-orange-600 mt-1">¥{res.total.toLocaleString()}</div>
                      </div>
                    </div>

                    {res.notes && (
                      <div className="bg-stone-50 p-4 rounded-2xl text-xs font-bold text-stone-600 border border-stone-100 flex gap-2 mb-4 ml-2">
                        <MessageSquare size={16} className="shrink-0 text-orange-400"/>
                        {res.notes}
                      </div>
                    )}

                    <div className="grid grid-cols-1 gap-1 ml-2">
                      {Object.values(res.items).map(item => (
                        <div key={item.id+item.flavor} className="flex justify-between text-xs font-bold py-1 border-b border-stone-50 last:border-0">
                          <span className="text-stone-500">{MENU_ITEMS.find(m=>m.id===item.id).name} <span className="text-[10px] text-stone-300">({item.flavor})</span></span>
                          <span>{item.amount}本</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))
              )}
            </section>
          </div>
        )}
      </main>
    </div>
  );
}
